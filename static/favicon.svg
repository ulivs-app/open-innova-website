<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Open Innova favicon">
  <defs>
    <linearGradient id="oi-favicon-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f5641"/>
      <stop offset="60%" stop-color="#2d7a5f"/>
      <stop offset="100%" stop-color="#4ca37f"/>
    </linearGradient>
  </defs>
  <!-- Navy background -->
  <rect width="64" height="64" rx="6" fill="#1a2647"/>
  <!-- Two diagonal green arcs (option 08) -->
  <path d="M 6 -2 Q 24 24 22 46"
        fill="none" stroke="url(#oi-favicon-grad)" stroke-width="7" stroke-linecap="round"/>
  <path d="M 32 -2 Q 50 24 48 46"
        fill="none" stroke="url(#oi-favicon-grad)" stroke-width="7" stroke-linecap="round"/>
  <!-- White terminal nodes -->
  <circle cx="22" cy="46" r="5" fill="#ffffff"/>
  <circle cx="48" cy="46" r="5" fill="#ffffff"/>
</svg>
