<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Open Innova">
  <defs>
    <linearGradient id="oi-logo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f5641"/>
      <stop offset="60%" stop-color="#2d7a5f"/>
      <stop offset="100%" stop-color="#4ca37f"/>
    </linearGradient>
  </defs>
  <!-- Open circle: arc from ~8 o'clock going clockwise (top, right, bottom) to ~7 o'clock, leaving a gap on the lower-left -->
  <path d="M 9.5 45 A 26 26 0 1 1 19 54.5"
        fill="none"
        stroke="url(#oi-logo-grad)"
        stroke-width="6"
        stroke-linecap="round"/>
  <!-- Dot sitting in the gap (lower-left) -->
  <circle cx="9.5" cy="45" r="4.5" fill="#1a2647"/>
</svg>
